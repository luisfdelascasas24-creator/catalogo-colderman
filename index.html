<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Colderman</title>
<link rel="apple-touch-icon" href="https://luisfdelascasas24-creator.github.io/catalogo-colderman/LOGO%20SIN%20FONDO%20COLDERMAN.png">
<link rel="icon" type="image/png" href="https://luisfdelascasas24-creator.github.io/catalogo-colderman/LOGO%20SIN%20FONDO%20COLDERMAN.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Colderman">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; }
.topbar { background: #185FA5; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.topbar-title { color: #E6F1FB; font-size: 16px; font-weight: 600; }
.back-btn { color: #B5D4F4; font-size: 14px; cursor: pointer; background: none; border: none; padding: 0; }
.search-wrap { padding: 10px 12px; background: #f0f2f5; border-bottom: 1px solid #e0e0e0; }
.search-wrap input { width: 100%; font-size: 14px; padding: 9px 14px; border-radius: 8px; border: 1px solid #d0d0d0; background: white; color: #333; outline: none; }
.cats-wrap { display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto; border-bottom: 1px solid #e0e0e0; scrollbar-width: none; }
.cats-wrap::-webkit-scrollbar { display: none; }
.cat { font-size: 12px; padding: 5px 12px; border-radius: 20px; white-space: nowrap; font-weight: 500; cursor: pointer; border: 1px solid #d0d0d0; background: white; color: #555; }
.cat.active { background: #185FA5; color: white; border-color: #185FA5; }
.product-list { padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; }
.product-card { background: white; border: 1px solid #e8e8e8; border-radius: 12px; padding: 10px 12px; display: flex; gap: 10px; align-items: center; cursor: pointer; }
.product-thumb { width: 64px; height: 64px; border-radius: 8px; background: #f0f2f5; object-fit: cover; flex-shrink: 0; }
.product-info { flex: 1; min-width: 0; }
.product-name { font-size: 14px; font-weight: 600; color: #222; }
.product-price-list { font-size: 15px; color: #185FA5; font-weight: 800; margin: 2px 0; }
.product-code { font-size: 11px; color: #888; }
.detail-view { display: none; padding-bottom: 30px; }
.detail-view.active { display: block; }
.list-view.hidden { display: none; }
.photos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 12px; background: #f0f2f5; }
.photo-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; cursor: pointer; border: 3px solid transparent; }
.photo-item.selected { border-color: #185FA5; }
.photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-check { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; border-radius: 50%; background: #185FA5; display: none; align-items: center; justify-content: center; color: white; font-size: 12px; }
.photo-item.selected .photo-check { display: flex; }
.detail-body { padding: 16px; }
.detail-name { font-size: 18px; font-weight: 700; color: #222; }
.detail-price-box { background: #E6F1FB; padding: 12px; border-radius: 10px; margin: 12px 0; }
.detail-price-label { font-size: 12px; color: #185FA5; font-weight: 600; text-transform: uppercase; }
.detail-price-val { font-size: 24px; color: #185FA5; font-weight: 800; }
.spec-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
.spec-label { color: #888; }
.spec-val { color: #222; font-weight: 600; }
.actions { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.btn-wsp { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #25D366; color: white; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 10px rgba(37,211,102,0.3); }
.btn-wsp:disabled { background: #ccc; box-shadow: none; }
</style>
</head>
<body>

<div class="app">
  <div class="list-view" id="listView">
    <div class="topbar"><span class="topbar-title">📦 Catálogo Colderman</span></div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Buscar por código, marca o nombre..." oninput="filterProducts()" />
    </div>
    <div class="cats-wrap" id="catsWrap">
      <button class="cat active" onclick="filterCat(this, '')">Todos</button>
    </div>
    <div id="productCount" style="padding: 10px 16px; font-size: 12px; color: #888;">Cargando...</div>
    <div id="productList" class="product-list"></div>
  </div>

  <div class="detail-view" id="detailView">
    <div class="topbar">
      <button class="back-btn" onclick="goBack()">‹ Volver</button>
      <span class="topbar-title">Información Técnica</span>
    </div>
    <div class="photos-grid" id="photosGrid"></div>
    <div class="detail-body">
      <p class="detail-name" id="dNombre"></p>
      <div class="detail-price-box">
        <p class="detail-price-label">Precio Sugerido</p>
        <p class="detail-price-val" id="dPrecio"></p>
      </div>
      <p id="dCodigo" style="font-size:12px; color:#999; margin-bottom:15px;"></p>
      <div id="specsContainer"></div>
    </div>
    <div class="actions">
      <button class="btn-wsp" id="wspBtn" onclick="shareEverything()" disabled>💬 Enviar Cotización</button>
      <p style="font-size:11px; color:#999; text-align:center;">Selecciona fotos para enviar. El precio se incluye en el mensaje.</p>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1pXIUcd2WNbr29ZWkxOdISj--yTB64vPAxQyfVjOLoQ0';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;

let allProducts = [];
let currentProduct = null;
let selectedPhotos = [];
let activeCat = '';

async function loadProducts() {
  try {
    const res = await fetch(URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
    
    // Mapeo automático por nombre de columna
    const cols = json.table.cols.map(c => c.label);
    allProducts = json.table.rows.map(row => {
      const p = {};
      row.c.forEach((cell, i) => {
        if (cols[i]) p[cols[i]] = cell ? String(cell.v) : '';
      });
      return p;
    }).filter(p => p['Codigo'] || p['Producto']);

    renderCats(allProducts);
    renderList(allProducts);
  } catch(e) { 
    console.error(e);
    document.getElementById('productList').innerHTML = "<p style='padding:20px;'>Error al cargar datos. Revisa el Excel.</p>";
  }
}

function renderList(products) {
  const list = document.getElementById('productList');
  document.getElementById('productCount').textContent = `${products.length} productos encontrados`;
  list.innerHTML = products.map((p, idx) => `
    <div class="product-card" onclick="showDetail(${allProducts.indexOf(p)})">
      <img class="product-thumb" src="${p['Foto1'] || ''}" onerror="this.src='https://via.placeholder.com/80?text=📦'" />
      <div class="product-info">
        <p class="product-name">${p['Producto'] || ''} ${p['Item'] || ''}</p>
        <p class="product-price-list">${p['Precio'] ? '$ ' + Number(p['Precio']).toLocaleString('es-CL') : 'Consultar'}</p>
        <p class="product-code">Cód: ${p['Codigo'] || 'S/N'}</p>
      </div>
      <span style="color:#ccc;">›</span>
    </div>`).join('');
}

function renderCats(products) {
  const cats = [...new Set(products.map(p => p['Producto']).filter(Boolean))].sort();
  const wrap = document.getElementById('catsWrap');
  wrap.innerHTML = `<button class="cat active" onclick="filterCat(this, '')">Todos</button>` +
    cats.map(c => `<button class="cat" onclick="filterCat(this, '${c}')">${c}</button>`).join('');
}

function filterCat(btn, cat) {
  activeCat = cat;
  document.querySelectorAll('.cat').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterProducts();
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allProducts.filter(p => Object.values(p).some(v => String(v).toLowerCase().includes(q)));
  if (activeCat) filtered = filtered.filter(p => p['Producto'] === activeCat);
  renderList(filtered);
}

function showDetail(idx) {
  currentProduct = allProducts[idx];
  selectedPhotos = [];
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');
  
  document.getElementById('dNombre').textContent = `${currentProduct['Producto']} ${currentProduct['Item']}`;
  document.getElementById('dPrecio').textContent = currentProduct['Precio'] ? '$ ' + Number(currentProduct['Precio']).toLocaleString('es-CL') : 'A convenir';
  document.getElementById('dCodigo').textContent = `Código Interno: ${currentProduct['Codigo']}`;

  const specs = ['Marca','Modelo','Ranuras Polea','Voltaje','Refrigerante'];
  document.getElementById('specsContainer').innerHTML = specs
    .filter(k => currentProduct[k])
    .map(k => `<div class="spec-row"><span class="spec-label">${k}</span><span class="spec-val">${currentProduct[k]}</span></div>`).join('');

  const fotos = ['Foto1','Foto2','Foto3','Foto4'].filter(k => currentProduct[k]);
  document.getElementById('photosGrid').innerHTML = fotos.map((k, i) => `
    <div class="photo-item" id="photo-${i}" onclick="togglePhoto(${i}, '${currentProduct[k]}')">
      <img src="${currentProduct[k]}" />
      <div class="photo-check">✓</div>
    </div>`).join('');
  updateWspBtn();
}

function togglePhoto(idx, url) {
  const el = document.getElementById(`photo-${idx}`);
  const i = selectedPhotos.indexOf(url);
  if (i === -1) { selectedPhotos.push(url); el.classList.add('selected'); }
  else { selectedPhotos.splice(i, 1); el.classList.remove('selected'); }
  updateWspBtn();
}

function updateWspBtn() {
  document.getElementById('wspBtn').disabled = selectedPhotos.length === 0;
}

async function shareEverything() {
  const p = currentProduct;
  const btn = document.getElementById('wspBtn');
  const priceText = p['Precio'] ? `$${Number(p['Precio']).toLocaleString('es-CL')}` : 'Consultar';
  
  const text = `*${p['Producto']} ${p['Item']}*\nCódigo: ${p['Codigo']}\nMarca: ${p['Marca']}\nPrecio: ${priceText}\n\n_Enviado desde Catálogo Colderman_`;

  try {
    btn.textContent = '⏳ Preparando...';
    await navigator.clipboard.writeText(text);

    const filePromises = selectedPhotos.map(async (url, i) => {
      const finalUrl = `https://images.weserv.nl/?url=${encodeURIComponent(url)}&output=jpg&q=70`;
      const res = await fetch(finalUrl);
      const blob = await res.blob();
      return new File([blob], `item_${i+1}.jpg`, { type: 'image/jpeg' });
    });

    const files = await Promise.all(filePromises);
    await navigator.share({ files: files, text: text });
  } catch(e) {
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  } finally {
    btn.textContent = '💬 Enviar Cotización';
  }
}

function goBack() {
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('detailView').classList.remove('active');
  window.scrollTo(0,0);
}

loadProducts();
</script>
</body>
</html>
