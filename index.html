<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Colderman</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; }
.topbar { background: #185FA5; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.topbar-title { color: #E6F1FB; font-size: 16px; font-weight: 600; }
.back-btn { color: #B5D4F4; font-size: 14px; cursor: pointer; background: none; border: none; padding: 0; }
.search-wrap { padding: 10px 12px; background: #f0f2f5; border-bottom: 1px solid #e0e0e0; }
.search-wrap input { width: 100%; font-size: 14px; padding: 9px 14px; border-radius: 8px; border: 1px solid #d0d0d0; background: white; color: #333; outline: none; }
.search-wrap input:focus { border-color: #185FA5; }
.loading { padding: 3rem; text-align: center; color: #888; font-size: 14px; }
.product-list { padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; }
.count-badge { font-size: 12px; color: #888; padding: 6px 12px; }
.product-card { background: white; border: 1px solid #e8e8e8; border-radius: 12px; padding: 10px 12px; display: flex; gap: 10px; align-items: center; cursor: pointer; }
.product-card:active { background: #f5f5f5; }
.product-thumb { width: 56px; height: 56px; border-radius: 8px; background: #f0f2f5; object-fit: cover; flex-shrink: 0; }
.product-thumb-placeholder { width: 56px; height: 56px; border-radius: 8px; background: #f0f2f5; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 22px; }
.product-info { flex: 1; min-width: 0; }
.product-name { font-size: 14px; font-weight: 600; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-code { font-size: 12px; color: #888; margin-top: 3px; }
.arrow { color: #bbb; font-size: 18px; }
.detail-view { display: none; }
.detail-view.active { display: block; }
.list-view.hidden { display: none; }
.photos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 12px; background: #f0f2f5; }
.photo-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; cursor: pointer; border: 3px solid transparent; transition: border-color 0.15s; }
.photo-item.selected { border-color: #185FA5; }
.photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-check { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; border-radius: 50%; background: #185FA5; display: none; align-items: center; justify-content: center; }
.photo-item.selected .photo-check { display: flex; }
.detail-body { padding: 14px; }
.detail-name { font-size: 17px; font-weight: 600; color: #222; }
.detail-code { font-size: 13px; color: #888; margin-top: 3px; margin-bottom: 16px; }
.specs-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.spec-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
.spec-label { color: #888; }
.spec-val { color: #222; font-weight: 500; }
.actions { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.btn-copy { width: 100%; padding: 13px; border-radius: 10px; border: 1.5px solid #185FA5; background: #E6F1FB; color: #0C447C; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-copy:active { background: #B5D4F4; }
.btn-wsp { width: 100%; padding: 13px; border-radius: 10px; border: none; background: #25D366; color: white; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-wsp:active { background: #1da851; }
.btn-wsp:disabled { background: #b0b0b0; cursor: not-allowed; }
.select-hint { font-size: 12px; color: #888; text-align: center; }
.copied-msg { font-size: 13px; color: #25D366; text-align: center; font-weight: 500; display: none; }
.empty { padding: 3rem; text-align: center; color: #888; font-size: 14px; }
.no-photo { display: none; }
</style>
</head>
<body>

<div class="app">
  <div class="list-view" id="listView">
    <div class="topbar">
      <span class="topbar-title">📦 Catálogo Colderman</span>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Buscar por código, producto o marca..." oninput="filterProducts()" />
    </div>
    <div id="productCount" class="count-badge"></div>
    <div id="productList" class="product-list">
      <div class="loading">Cargando productos...</div>
    </div>
  </div>

  <div class="detail-view" id="detailView">
    <div class="topbar">
      <button class="back-btn" onclick="goBack()">‹ Volver</button>
      <span class="topbar-title" id="detailTitle"></span>
    </div>
    <div class="photos-grid" id="photosGrid"></div>
    <div class="detail-body">
      <p class="detail-name" id="dNombre"></p>
      <p class="detail-code" id="dCodigo"></p>
      <p class="specs-title">Especificaciones</p>
      <div id="specsContainer"></div>
    </div>
    <div class="actions">
      <button class="btn-copy" onclick="copyText()">
        📋 Copiar datos del producto
      </button>
      <div class="copied-msg" id="copiedMsg">✓ Datos copiados al portapapeles</div>
      <button class="btn-wsp" id="wspBtn" onclick="shareWhatsApp()" disabled>
        💬 Compartir por WhatsApp
      </button>
      <p class="select-hint" id="selectHint">Selecciona las fotos que quieres enviar</p>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1pXIUcd2WNbr29ZWkxOdISj--yTB64vPAxQyfVjOLoQ0';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let allProducts = [];
let currentProduct = null;
let selectedPhotos = [];

async function loadProducts() {
  try {
    const res = await fetch(URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const cols = json.table.cols.map(c => c.label);
    const rows = json.table.rows;
    allProducts = rows.map(row => {
      const obj = {};
      cols.forEach((col, i) => {
        obj[col] = row.c[i] ? (row.c[i].v || '') : '';
      });
      return obj;
    }).filter(p => p['Código'] || p['Producto']);
    renderList(allProducts);
  } catch(e) {
    document.getElementById('productList').innerHTML = '<div class="empty">Error cargando productos.</div>';
  }
}

function renderList(products) {
  const list = document.getElementById('productList');
  const count = document.getElementById('productCount');
  count.textContent = `${products.length} productos`;
  if (products.length === 0) {
    list.innerHTML = '<div class="empty">No se encontraron productos</div>';
    return;
  }
  list.innerHTML = products.map((p) => {
    const foto = p['Foto1'] || '';
    const thumb = foto
      ? `<img class="product-thumb" src="${foto}" onerror="this.style.display='none'" />`
      : `<div class="product-thumb-placeholder">📦</div>`;
    return `<div class="product-card" onclick="showDetail(${allProducts.indexOf(p)})">
      ${thumb}
      <div class="product-info">
        <p class="product-name">${p['Producto'] || ''} ${p['Item'] || ''}</p>
        <p class="product-code">Cód: ${p['Código'] || ''} · ${p['Marca'] || ''} ${p['Modelo'] || ''}</p>
      </div>
      <span class="arrow">›</span>
    </div>`;
  }).join('');
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allProducts.filter(p =>
    Object.values(p).some(v => String(v).toLowerCase().includes(q))
  );
  renderList(filtered);
}

function showDetail(idx) {
  currentProduct = allProducts[idx];
  selectedPhotos = [];
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');
  document.getElementById('detailTitle').textContent = currentProduct['Código'] || '';
  document.getElementById('dNombre').textContent = `${currentProduct['Producto'] || ''} ${currentProduct['Item'] || ''}`;
  document.getElementById('dCodigo').textContent = `Código: ${currentProduct['Código'] || ''}`;

  const specs = ['Marca','Modelo','Ranuras Polea','Voltaje','Refrigerante'];
  document.getElementById('specsContainer').innerHTML = specs
    .filter(k => currentProduct[k])
    .map(k => `<div class="spec-row"><span class="spec-label">${k}</span><span class="spec-val">${currentProduct[k]}</span></div>`)
    .join('');

  const fotos = ['Foto1','Foto2','Foto3','Foto4'].filter(k => currentProduct[k]);
  const grid = document.getElementById('photosGrid');
  if (fotos.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:1rem;text-align:center;color:#888;font-size:13px;">Sin fotos cargadas</div>';
  } else {
    grid.innerHTML = fotos.map((k, i) => `
      <div class="photo-item" id="photo-${i}" onclick="togglePhoto(${i}, '${currentProduct[k]}')">
        <img src="${currentProduct[k]}" onerror="this.parentElement.style.display='none'" />
        <div class="photo-check">✓</div>
      </div>`).join('');
  }
  updateWspBtn();
}

function togglePhoto(idx, url) {
  const el = document.getElementById(`photo-${idx}`);
  const i = selectedPhotos.indexOf(url);
  if (i === -1) { selectedPhotos.push(url); el.classList.add('selected'); }
  else { selectedPhotos.splice(i, 1); el.classList.remove('selected'); }
  updateWspBtn();
}

function updateWspBtn() {
  const btn = document.getElementById('wspBtn');
  const hint = document.getElementById('selectHint');
  if (selectedPhotos.length === 0) {
    btn.disabled = true;
    hint.textContent = 'Selecciona las fotos que quieres enviar';
  } else {
    btn.disabled = false;
    hint.textContent = `${selectedPhotos.length} foto(s) seleccionada(s)`;
  }
}

function copyText() {
  const p = currentProduct;
  const text = `*${p['Producto'] || ''} ${p['Item'] || ''}*\nCódigo: ${p['Código'] || ''}\nMarca: ${p['Marca'] || ''}\nModelo: ${p['Modelo'] || ''}\nRanuras Polea: ${p['Ranuras Polea'] || ''}\nVoltaje: ${p['Voltaje'] || ''}\nRefrigerante: ${p['Refrigerante'] || ''}`;
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copiedMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2500);
  });
}

function shareWhatsApp() {
  const p = currentProduct;
  const text = `*${p['Producto'] || ''} ${p['Item'] || ''}*\nCódigo: ${p['Código'] || ''}\nMarca: ${p['Marca'] || ''}\nModelo: ${p['Modelo'] || ''}\nVoltaje: ${p['Voltaje'] || ''}\nRefrigerante: ${p['Refrigerante'] || ''}\n\nFotos:\n${selectedPhotos.join('\n')}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function goBack() {
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('detailView').classList.remove('active');
  currentProduct = null;
  selectedPhotos = [];
}

loadProducts();
</script>
</body>
</html>
